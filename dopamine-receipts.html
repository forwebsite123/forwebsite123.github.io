<script>
function openModal(idx) {
  const w = allWorkouts[idx];
  document.getElementById('modal-title').textContent = `${w.typeLabel} · ${fmtDate(w.start)}`;

  const dur = fmtDur(w.duration || 0);
  const extraStats = [];

  if (w.hr) {
    extraStats.push(`
      <div class="modal-stat">
        <div class="stat-label">平均心率</div>
        <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
          ${Math.round(w.hr)} <span style="font-size:14px;color:var(--muted)">bpm</span>
        </div>
      </div>
    `);
  }

  const NO_SPEED = new Set([
    'Tennis','TableTennis','Badminton','Basketball','Soccer','Volleyball',
    'Wrestling','Boxing','MartialArts','Gymnastics','Dance','Yoga',
    'Pilates','Barre','CoreTraining','FunctionalStrengthTraining',
    'HighIntensityIntervalTraining'
  ]);

  if (w.typeKey === 'Swimming' && w.dist && w.duration > 0) {
    const dv = parseFloat(w.dist);
    const du = (w.distUnit || '').toLowerCase();
    const distM = (du === 'm' || du === 'meter' || du === 'meters') ? dv : dv * 1000;

    if (distM > 10) {
      const pace100sec = Math.round(w.duration / distM * 100);
      const pm = Math.floor(pace100sec / 60);
      const ps = pace100sec % 60;
      extraStats.push(`
        <div class="modal-stat">
          <div class="stat-label">平均配速</div>
          <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
            ${pm}'${String(ps).padStart(2,'0')}" <span style="font-size:14px;color:var(--muted)">/100m</span>
          </div>
        </div>
      `);
    }
  }

  if (!NO_SPEED.has(w.typeKey) && w.typeKey !== 'Swimming') {
    if (w.pace) {
      const pm = Math.floor(w.pace);
      const ps = Math.round((w.pace - pm) * 60);
      extraStats.push(`
        <div class="modal-stat">
          <div class="stat-label">配速</div>
          <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
            ${pm}'${String(ps).padStart(2,'0')}" <span style="font-size:14px;color:var(--muted)">/km</span>
          </div>
        </div>
      `);
    } else if (w.speed) {
      extraStats.push(`
        <div class="modal-stat">
          <div class="stat-label">平均速度</div>
          <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
            ${Number(w.speed).toFixed(1)} <span style="font-size:14px;color:var(--muted)">km/h</span>
          </div>
        </div>
      `);
    }
  }

  if (w.vertDrop && w.vertDrop > 10) {
    extraStats.push(`
      <div class="modal-stat">
        <div class="stat-label">垂直落差</div>
        <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
          ${w.vertDrop} <span style="font-size:14px;color:var(--muted)">m</span>
        </div>
      </div>
    `);
  }

  if (w.elevGain && w.elevGain > 10 && !['Snowboarding','Skiing','DownhillSkiing'].includes(w.typeKey)) {
    extraStats.push(`
      <div class="modal-stat">
        <div class="stat-label">爬升</div>
        <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
          ${w.elevGain} <span style="font-size:14px;color:var(--muted)">m</span>
        </div>
      </div>
    `);
  }

  if (w.tempC !== null && w.tempC !== undefined) {
    extraStats.push(`
      <div class="modal-stat">
        <div class="stat-label">气温</div>
        <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
          ${w.tempC} <span style="font-size:14px;color:var(--muted)">°C</span>
        </div>
      </div>
    `);
  }

  if (w.humidity !== null && w.humidity !== undefined) {
    extraStats.push(`
      <div class="modal-stat">
        <div class="stat-label">湿度</div>
        <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
          ${w.humidity} <span style="font-size:14px;color:var(--muted)">%</span>
        </div>
      </div>
    `);
  }

  if (w.airQuality !== null && w.airQuality !== undefined) {
    extraStats.push(`
      <div class="modal-stat">
        <div class="stat-label">空气质量</div>
        <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
          ${w.airQuality}
        </div>
      </div>
    `);
  }

  if (w.typeKey === 'Swimming') {
    if (w.lapLength) {
      extraStats.push(`
        <div class="modal-stat">
          <div class="stat-label">泳池长度</div>
          <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
            ${w.lapLength} <span style="font-size:14px;color:var(--muted)">m</span>
          </div>
        </div>
      `);
    }
    if (w.strokeCount) {
      extraStats.push(`
        <div class="modal-stat">
          <div class="stat-label">总划水次数</div>
          <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
            ${w.strokeCount}
          </div>
        </div>
      `);
    }
  }

  document.getElementById('modal-stats').innerHTML = `
    <div class="modal-stat">
      <div class="stat-label">时长</div>
      <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
        ${dur.val} ${dur.unit}
      </div>
    </div>
    <div class="modal-stat">
      <div class="stat-label">热量</div>
      <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
        ${fmtCal(w.cal)}
      </div>
    </div>
    <div class="modal-stat">
      <div class="stat-label">距离</div>
      <div class="stat-value" style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">
        ${w.dist ? fmtDist(w.dist, w.distUnit) : '—'}
      </div>
    </div>
    ${extraStats.join('')}
  `;

  const runsContainer = document.getElementById('modal-runs');

  if (w.runs && w.runs.length > 0) {
    const runsWord = w.typeKey === 'Swimming' ? '圈' : '趟';

    const rows = w.runs.map((seg, i) => {
      const isObj = typeof seg === 'object';
      const durSec = isObj ? seg.durSec : seg;
      const mins = Math.floor(durSec / 60);
      const secs = Math.round(durSec % 60);
      const durStr = mins > 0 ? (secs > 0 ? `${mins}m${secs}s` : `${mins} min`) : `${secs}s`;

      const cells = [];
      cells.push(`
        <td style="padding:5px 10px 5px 0;color:var(--muted);font-size:12px;white-space:nowrap">
          第${i + 1}${runsWord}
        </td>
      `);
      cells.push(`<td style="padding:5px 10px">${durStr}</td>`);

      if (isObj && seg.dist) {
        const d = seg.dist;
        cells.push(`
          <td style="padding:5px 10px">
            ${d < 1 ? Math.round(d * 1000) + 'm' : d.toFixed(2) + ' km'}
          </td>
        `);
      }

      if (isObj && seg.strokeStyle) {
        cells.push(`<td style="padding:5px 10px;color:var(--muted)">${seg.strokeStyle}</td>`);
      }

      if (isObj && seg.pace100) {
        const pm = Math.floor(seg.pace100 / 60);
        const ps = String(seg.pace100 % 60).padStart(2, '0');
        cells.push(`<td style="padding:5px 10px">${pm}'${ps}"/100m</td>`);
      }

      if (isObj && seg.vertDrop) {
        cells.push(`<td style="padding:5px 10px">↓${seg.vertDrop}m</td>`);
      }

      if (isObj && seg.speed) {
        cells.push(`<td style="padding:5px 10px">${Number(seg.speed).toFixed(1)} km/h</td>`);
      }

      if (isObj && seg.maxSpeed) {
        cells.push(`<td style="padding:5px 10px;color:var(--muted)">最高${Number(seg.maxSpeed).toFixed(1)}</td>`);
      }

      if (isObj && seg.hr) {
        cells.push(`<td style="padding:5px 10px">${Math.round(seg.hr)} bpm</td>`);
      }

      if (isObj && seg.strokes) {
        cells.push(`<td style="padding:5px 10px;color:var(--muted)">${seg.strokes}划</td>`);
      }

      return `<tr style="border-bottom:1px solid var(--border)">${cells.join('')}</tr>`;
    }).join('');

    runsContainer.innerHTML = `
      <div style="margin-top:16px;border:1px solid var(--border);border-radius:4px;overflow:hidden">
        <div style="padding:10px 16px 8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)">
          共 ${w.runs.length} ${runsWord}
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  } else {
    runsContainer.innerHTML = '';
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => initMap(w), 80);
}
</script>
