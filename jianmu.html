<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌿%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>见木</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #fcfbf8;
      color: #6e4a4a;
      font-family: "Songti SC", "STSong", "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
      overflow-x: hidden;
    }
    .page {
      max-width: 800px;
      margin: 0 auto;
      padding: 42px 24px 96px;
      position: relative;
    }
    .topbar {
      margin-bottom: 28px;
    }
    .small-title {
      font-size: 18px;
      letter-spacing: 0.3px;
      color: #7a5757;
    }
    .back-link {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: rgba(122, 87, 87, 0.74);
      font-size: 15px;
    }
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .hero-title {
      margin: 0;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.1;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #8b5e5e;
    }
    .hero-subtitle {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.95;
      color: rgba(122, 87, 87, 0.64);
      font-style: italic;
      letter-spacing: 0.02em;
    }
    .story-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 220px;
      margin-top: 8px;
    }
    .story-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.94) 0%, rgba(255,251,249,0.92) 100%);
      border: 1px solid rgba(156, 115, 115, 0.10);
      border-radius: 22px;
      padding: 22px 24px 18px;
      box-shadow: 0 14px 34px rgba(122, 87, 87, 0.045);
      position: relative;
      overflow: hidden;
      min-height: 198px;
      display: flex;
      flex-direction: column;
    }
    .story-card::before {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(156,115,115,0) 0%, rgba(156,115,115,0.14) 18%, rgba(156,115,115,0.14) 82%, rgba(156,115,115,0) 100%);
    }
    .story-date {
      display: inline-block;
      font-size: 11.5px;
      letter-spacing: 0.12em;
      color: rgba(122, 87, 87, 0.54);
      background: transparent;
      padding: 0;
      border-radius: 0;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .story-title {
      margin: 0 0 10px;
      font-size: 23px;
      font-weight: 400;
      color: #875b5b;
      line-height: 1.52;
      letter-spacing: 0.01em;
    }
    .story-content {
      white-space: pre-wrap;
      line-height: 2.02;
      font-size: 15.3px;
      color: rgba(110, 74, 74, 0.88);
      overflow: hidden;
      position: relative;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
    }
    .story-card.is-expanded { min-height: 0; }
    .story-content::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2.6em;
      background: linear-gradient(180deg, rgba(252,251,248,0) 0%, rgba(255,251,249,0.92) 100%);
      pointer-events: none;
    }
    .story-card.is-expanded .story-content {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .story-card.is-expanded .story-content::after { display:none; }
    .story-more {
      margin-top: 16px;
      align-self: flex-start;
      border: none;
      background: transparent;
      color: #987171;
      font-size: 13.5px;
      line-height: 1.2;
      padding: 0 0 2px;
      cursor: pointer;
      font-family: inherit;
      border-bottom: 1px solid rgba(156,115,115,0.18);
      letter-spacing: 0.06em;
    }
    .story-more:hover { opacity: 0.78; }
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      line-height: 1.9;
      color: rgba(122, 87, 87, 0.62);
      border: 1px solid rgba(156, 115, 115, 0.10);
      border-radius: 22px;
      background: rgba(255,255,255,0.76);
      box-shadow: 0 10px 24px rgba(122, 87, 87, 0.03);
    }
    .page-footer {
      text-align: center;
      margin-top: 72px;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 1px;
      color: rgba(122, 87, 87, 0.7);
    }
    .gate-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      background: rgba(252, 251, 248, 0.76);
      backdrop-filter: blur(10px);
    }
    .gate-card {
      width: min(100%, 520px);
      max-height: min(88vh, 860px);
      overflow: auto;
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(255,251,249,0.94) 100%);
      border: 1px solid rgba(156, 115, 115, 0.14);
      border-radius: 22px;
      padding: 24px 24px 20px;
      box-shadow: 0 18px 48px rgba(122, 87, 87, 0.08);
    }
    .gate-eyebrow {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(122, 87, 87, 0.5);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .gate-title {
      margin: 0;
      font-size: 25px;
      font-weight: 400;
      color: #8b5e5e;
    }
    .gate-hint-global {
      margin-top: 8px;
      line-height: 1.85;
      font-size: 14px;
      color: rgba(122, 87, 87, 0.72);
    }
    .question-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .question-item {
      border: 1px solid rgba(156, 115, 115, 0.10);
      background: rgba(252,251,248,0.98);
      border-radius: 18px;
      padding: 15px 15px 14px;
    }
    .question-label {
      font-size: 16px;
      line-height: 1.85;
      color: #875f5f;
      margin-bottom: 5px;
    }
    .question-note {
      font-size: 12px;
      color: rgba(122, 87, 87, 0.58);
      margin-bottom: 8px;
      line-height: 1.7;
    }
    .gate-input {
      width: 100%;
      border: 1px solid rgba(156, 115, 115, 0.18);
      border-radius: 12px;
      padding: 11px 13px;
      background: rgba(255,255,255,0.96);
      color: #6e4a4a;
      font-size: 15px;
      font-family: "Songti SC", "STSong", "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
      outline: none;
    }
    .gate-input:focus {
      border-color: rgba(156, 115, 115, 0.34);
      box-shadow: 0 0 0 3px rgba(156, 115, 115, 0.06);
    }
    .gate-actions {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .gate-submit {
      border: none;
      background: #9c7373;
      color: #fff;
      border-radius: 999px;
      padding: 11px 22px;
      font-size: 14px;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(156, 115, 115, 0.14);
      font-family: inherit;
    }
    .gate-submit:disabled {
      opacity: 0.72;
      cursor: wait;
    }
    .gate-error {
      min-height: 20px;
      font-size: 13px;
      color: #a26060;
      line-height: 1.6;
    }
    .gate-soft-note {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(122, 87, 87, 0.50);
      line-height: 1.7;
    }
    .hidden { display: none !important; }

    @media (max-width: 760px) {
      .page { padding: 30px 18px 72px; }
      .small-title { font-size: 16px; }
      .back-link { margin-top: 10px; font-size: 14px; }
      .hero { margin-bottom: 22px; }
      .hero-title { font-size: 38px; }
      .hero-subtitle { font-size: 13px; }
      .story-list { gap: 14px; }
      .story-card { border-radius: 18px; padding: 18px 18px 16px; min-height: 186px; }
      .story-title { font-size: 20px; line-height: 1.5; }
      .story-content { font-size: 15px; }
      .story-more { margin-top: 14px; font-size: 12.5px; }
      .gate-card { padding: 20px 16px 18px; border-radius: 22px; }
      .gate-title { font-size: 24px; }
      .question-item { padding: 12px 12px 11px; }
      .question-label { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="small-title">A place to leave traces.</div>
      <a href="home" class="back-link">← Back</a>
    </div>

    <header class="hero">
      <h1 class="hero-title">展字如晤</h1>
      <div class="hero-subtitle">把一些不适合陈列在橱窗里的文字与思考，安静地放回树影里。</div>
    </header>

    <main class="story-list" id="story-list">
      <div class="empty-state">正在等待解锁。</div>
    </main>

    <div class="page-footer">“枝叶会记住风经过时的方向。”</div>
  </div>

  <div class="gate-overlay" id="jianmu-gate" aria-hidden="false">
    <div class="gate-card" role="dialog" aria-modal="true" aria-labelledby="jianmu-gate-title">
      <div class="gate-eyebrow">Private corner</div>
      <h2 class="gate-title" id="jianmu-gate-title">见木</h2>
      <div class="gate-hint-global" id="gate-hint-global">请回答下面的问题，全部答对后才能看见我的文字哦。</div>
      <div class="question-list" id="question-list"></div>
      <div class="gate-actions">
        <button class="gate-submit" type="button" id="jianmu-submit">查看故事</button>
        <div class="gate-error" id="jianmu-error"></div>
      </div>
    </div>
  </div>

    function normalizeDateValue(value) {
      return String(value || '').replace(/\./g, '-');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderStories(posts) {
      const list = document.getElementById('story-list');
      const ordered = [...posts].sort((a, b) => normalizeDateValue(b.date).localeCompare(normalizeDateValue(a.date)));
      if (!ordered.length) {
        list.innerHTML = '<div class="empty-state">故事页已经准备好了。<br>等你把自己的内容加密放进去之后，它们就会按日期从新到旧出现。</div>';
        return;
      }
      list.innerHTML = ordered.map((post, index) => {
        const title = post.title ? `<h2 class="story-title">${escapeHtml(post.title)}</h2>` : '';
        return `
          <article class="story-card" data-story-card data-story-id="${index}">
            <div class="story-date">${escapeHtml(post.date || '')}</div>
            ${title}
            <div class="story-content">${escapeHtml(post.content || '')}</div>
            <button class="story-more" type="button" data-toggle-story>阅读全文</button>
          </article>
        `;
      }).join('');
    }

    function base64ToBytes(base64) {
      const binary = atob(base64);
      return Uint8Array.from(binary, char => char.charCodeAt(0));
    }

    function buildSecretFromAnswers(answers) {
      return answers.map(value => String(value || '').trim()).join('\u241F');
    }

    async function deriveAesKey(secret) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        enc.encode(secret),
        'PBKDF2',
        false,
        ['deriveKey']
      );

      return crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt: base64ToBytes(JIANMU_LOCK.salt),
          iterations: JIANMU_LOCK.iterations,
          hash: 'SHA-256'
        },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }

    async function decryptPostsFromAnswers(answers) {
      const secret = buildSecretFromAnswers(answers);
      const key = await deriveAesKey(secret);
      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: base64ToBytes(JIANMU_LOCK.iv) },
        key,
        base64ToBytes(JIANMU_LOCK.payload)
      );
      const text = new TextDecoder().decode(decrypted);
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error('invalid-content');
      return data;
    }

    function bindStoryToggles() {
      const list = document.getElementById('story-list');
      if (list.dataset.toggleBound === 'true') return;
      list.dataset.toggleBound = 'true';
      list.addEventListener('click', function(event) {
        const btn = event.target.closest('[data-toggle-story]');
        if (!btn) return;
        const card = btn.closest('[data-story-card]');
        if (!card) return;
        const expanded = card.classList.toggle('is-expanded');
        btn.textContent = expanded ? '收起全文' : '阅读全文';
      });
    }

    function renderQuestions() {
      const list = document.getElementById('question-list');
      const questions = Array.isArray(JIANMU_LOCK.questions) && JIANMU_LOCK.questions.length
        ? JIANMU_LOCK.questions
        : [{ question: '请输入密码', hint: '请输入答案', placeholder: '答案' }];

      list.innerHTML = questions.map((item, index) => `
        <div class="question-item">
          <div class="question-label">${escapeHtml(item.question || `问题 ${index + 1}`)}</div>
          <div class="question-note">${escapeHtml(item.hint || '')}</div>
          <input
            class="gate-input gate-answer"
            type="password"
            autocomplete="off"
            placeholder="${escapeHtml(item.placeholder || '请输入答案')}"
            data-index="${index}"
          />
        </div>
      `).join('');

      const first = list.querySelector('.gate-answer');
      setTimeout(() => { if (first) first.focus(); }, 60);
    }

    async function unlockStories() {
      const error = document.getElementById('jianmu-error');
      const button = document.getElementById('jianmu-submit');
      const inputs = Array.from(document.querySelectorAll('.gate-answer'));
      const values = inputs.map(input => input.value.trim());

      if (!values.length || values.some(value => !value)) {
        error.textContent = '请先把所有答案都填完。';
        return;
      }

      button.disabled = true;
      error.textContent = '正在核对…';

      try {
        const posts = await decryptPostsFromAnswers(values);
        renderStories(posts);
        document.getElementById('jianmu-gate').classList.add('hidden');
        inputs.forEach(input => input.value = '');
      } catch (err) {
        error.textContent = '答案不对，再想想。';
      } finally {
        button.disabled = false;
      }
    }

    bindStoryToggles();
    renderQuestions();
    document.getElementById('jianmu-submit').addEventListener('click', unlockStories);
    document.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter' && !document.getElementById('jianmu-gate').classList.contains('hidden')) {
