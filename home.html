<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌿%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A place to leave traces.</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fcfbf8;
      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 16px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.7);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .small-title {
      font-size: 18px;
      letter-spacing: 0.3px;
      color: #7a5757;
    }

    .search-btn {
      border: none;
      background: transparent;
      font-size: 24px;
      cursor: pointer;
      color: #7a5757;
      padding: 4px 8px;
    }

    /* ── Behind the pixels ── */
    .about-link-wrap {
      text-align: center;
      margin-bottom: 44px;
    }

    .about-link {
      font-size: 17px;
      letter-spacing: 0.13em;
      font-style: italic;
      font-family: "Times New Roman", Georgia, serif;
      color: transparent;
      -webkit-text-stroke: 0.75px rgba(156, 115, 115, 0.38);
      text-decoration: none;
      transition: -webkit-text-stroke-color 0.4s ease, letter-spacing 0.4s ease;
      cursor: pointer;
    }

    .about-link:hover {
      -webkit-text-stroke-color: rgba(156, 115, 115, 0.82);
      letter-spacing: 0.18em;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 56px 64px;
    }

    .card {
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      padding: 28px;
      border: 1.5px solid #9c7373;
      text-decoration: none;
      color: #7a5757;
      background: transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(122, 87, 87, 0.08);
      background: rgba(255, 255, 255, 0.55);
    }

    .card-inner {
      text-align: center;
    }

    .cn {
      font-size: 42px;
      line-height: 1.2;
      margin-bottom: 16px;
      font-weight: 400;
    }

    .en {
      font-size: 22px;
      line-height: 1.4;
      font-style: italic;
      font-weight: 400;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .topbar {
        margin-bottom: 24px;
      }

      .cn {
        font-size: 34px;
      }

      .en {
        font-size: 20px;
      }

      .card {
        min-height: 180px;
      }

      .about-link {
        font-size: 14px;
      }
    }
  </style>
</head>
  
<body>
  
  <div class="page">
    <div class="topbar">
      <div class="small-title">A place to leave traces.</div>
      <button class="search-btn" aria-label="Search" id="search-icon">⌕</button>
    </div>

    <div class="about-link-wrap">
      <a href="about.html" class="about-link">Behind the pixels</a>
    </div>

    <div class="grid">
      <a class="card" href="Drift-coordinates.html">
        <div class="card-inner">
          <div class="cn">漂流坐标</div>
          <div class="en">Drift Coordinates</div>
        </div>
      </a>

      <a class="card" href="dopamine-receipts.html">
        <div class="card-inner">
          <div class="cn">多巴胺账本</div>
          <div class="en">Dopamine Receipts</div>
        </div>
      </a>

      <a class="card" href="found-fragments.html">
        <div class="card-inner">
          <div class="cn">人间拾遗</div>
          <div class="en">Found Fragments</div>
        </div>
      </a>

      <a class="card" href="into-the-wild.html">
        <div class="card-inner">
          <div class="cn">沉浸体验</div>
          <div class="en">Into the Wild</div>
        </div>
      </a>
    </div>
  </div>
  <div class="footer-text">
    "做一颗独立的树 而不是攀附在树上的藤 然后长出新的枝桠和漂亮的花💐"
  </div>

  <script data-goatcounter="https://kiara-mytrace.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>
  <script>
    (function() {
      fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(d => {
          console.log("Session Log:", {
            timestamp: new Date().toISOString(),
            location: `${d.city}, ${d.region}, ${d.country_name}`,
            network: d.org,
            resolution: `${window.innerWidth}px`,
            referrer: document.referrer || "direct"
          });
        })
        .catch(() => {});
    })();
  </script>
  <script src="/search.js"></script>
</body>
</html>
