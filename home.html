<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌿%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A place to leave traces.</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fcfbf8;
      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;
      overflow-x: hidden;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
    }

    .footer-text {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 20px;
      font-size: 16px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.7);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .small-title {
      font-size: 18px;
      letter-spacing: 0.3px;
      color: #7a5757;
    }

    .search-btn {
      border: none;
      background: transparent;
      font-size: 24px;
      cursor: pointer;
      color: #7a5757;
      padding: 4px 8px;
    }

    .about-link-wrap {
      text-align: center;
      margin-bottom: 44px;
    }

    .about-link {
      font-size: 17px;
      letter-spacing: 0.13em;
      font-style: italic;
      font-family: "Times New Roman", Georgia, serif;
      color: transparent;
      -webkit-text-stroke: 0.75px rgba(156, 115, 115, 0.38);
      text-decoration: none;
      transition: -webkit-text-stroke-color 0.4s ease, letter-spacing 0.4s ease;
      cursor: pointer;
    }

    .about-link:hover {
      -webkit-text-stroke-color: rgba(156, 115, 115, 0.82);
      letter-spacing: 0.18em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 56px 64px;
    }

    .card {
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      padding: 28px;
      border: 1.5px solid #9c7373;
      text-decoration: none;
      color: #7a5757;
      background: transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      position: relative;
      z-index: 2;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(122, 87, 87, 0.08);
      background: rgba(255, 255, 255, 0.55);
    }

    .card-inner {
      text-align: center;
    }

    .cn {
      font-size: 42px;
      line-height: 1.2;
      margin-bottom: 16px;
      font-weight: 400;
    }

    .en {
      font-size: 22px;
      line-height: 1.4;
      font-style: italic;
      font-weight: 400;
    }

    /* ── Botanical corner decorations ── */
    .flora {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }

    .flora img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    filter: saturate(0.82) brightness(1.07) contrast(0.96);
    }

    .flora-tl {
      top: -10px;
      left: -170px;
      width: 215px;
      opacity: 0.24;
    }

    .flora-tr {
      top: -6px;
      right: -168px;
      width: 190px;
      opacity: 0.28;
      transform: rotate(180deg);
    }


    .flora-tl img {
      -webkit-mask-image: radial-gradient(ellipse at 2% 2%, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.92) 20%, rgba(0,0,0,0.78) 40%, rgba(0,0,0,0.52) 58%, rgba(0,0,0,0.28) 74%, rgba(0,0,0,0.1) 88%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(ellipse at 2% 2%, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.92) 20%, rgba(0,0,0,0.78) 40%, rgba(0,0,0,0.52) 58%, rgba(0,0,0,0.28) 74%, rgba(0,0,0,0.1) 88%, rgba(0,0,0,0) 100%);
      filter: blur(0.5px);
    }


    .flora-tr img {
      -webkit-mask-image: radial-gradient(ellipse at 72% 24%, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0.72) 78%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(ellipse at 72% 24%, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0.72) 78%, rgba(0,0,0,0) 100%);
    }

    .flora-bl {
      bottom: -86px;
      left: auto;
      right: -158px;
      width: 182px;
      opacity: 0.24;
      transform: rotate(-8deg);
    }

    .flora-br {
      bottom: -82px;
      right: auto;
      left: -148px;
      width: 195px;
      opacity: 0.25;
      transform: rotate(-90deg);
      transform-origin: center center;
    }

    @media (max-width: 820px) {
      .page {
        padding: 28px 18px 60px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .topbar {
        margin-bottom: 18px;
      }

      .about-link-wrap {
        margin-bottom: 30px;
      }

      .cn {
        font-size: 32px;
      }

      .en {
        font-size: 18px;
      }

      .card {
        min-height: 140px;
        padding: 22px;
      }

      .about-link {
        font-size: 14px;
      }

      .footer-text {
        font-size: 13px;
        margin-top: 6px;
        margin-bottom: 16px;
      }

      .flora-tl {
        width: 100px;
        top: -6px;
        left: -30px;
        opacity: 0.18;
      }

      .flora-tr {
        width: 90px;
        top: -4px;
        right: -28px;
        opacity: 0.2;
        transform: rotate(180deg);
      }

      .flora-bl {
        width: 85px;
        bottom: -30px;
        left: auto;
        right: -25px;
        opacity: 0.18;
        transform: rotate(-8deg);
      }

      .flora-br {
        width: 95px;
        bottom: -32px;
        right: auto;
        left: -28px;
        opacity: 0.18;
        transform: rotate(-90deg);
        transform-origin: center center;
      }
    }
  </style>
</head>
