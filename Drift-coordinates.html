<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漂流坐标 · Drift Coordinates</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fcfbf8;
      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 34px 28px 90px;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    .top-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-note {
      font-size: 14px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.7);
      letter-spacing: 0.3px;
    }

    .back {
      text-decoration: none;
      color: rgba(122, 87, 87, 0.75);
      font-size: 15px;
    }

    .search-btn {
      text-decoration: none;
      color: #8a6666;
      font-size: 28px;
      line-height: 1;
    }

    .title-group {
      margin-bottom: 34px;
    }

    .cn-title {
      font-size: 28px;
      color: #8b5e5e;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .en-subtitle {
      font-size: 16px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.68);
    }

    .country-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 22px 28px;
      max-width: 980px;
      margin: 0 auto 70px;
    }

    .country-card {
      width: 150px;
      min-height: 92px;
      padding: 12px;
      border: 1.3px solid #b69191;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #8b5e5e;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      border-radius: 12px;
    }

    .country-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(122, 87, 87, 0.08);
      background: rgba(255,255,255,0.55);
    }

    .country-name {
      text-align: center;
      font-size: 23px;
      line-height: 1.2;
      font-style: italic;
    }

    .map-section {
      text-align: center;
    }

    .map-title {
      font-size: 24px;
      font-style: italic;
      color: #8b5e5e;
      margin-bottom: 8px;
    }

    .map-note {
      font-size: 14px;
      color: rgba(122, 87, 87, 0.65);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    .map-wrap {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 22px 22px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.2));
      border: 1px solid rgba(168, 122, 122, 0.12);
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(122, 87, 87, 0.06);
    }

    #leaflet-map {
      width: 100%;
      height: 620px;
      border-radius: 12px;
      overflow: hidden;
    }

    .legend {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 14px;
      color: rgba(122, 87, 87, 0.72);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #9c6e6e;
      box-shadow: 0 0 0 6px rgba(185, 133, 133, 0.18);
    }

    .legend-block {
      width: 18px;
      height: 14px;
      background: #d7c0c0;
      border: 1px solid rgba(122, 87, 87, 0.12);
      border-radius: 4px;
    }

    .footer-note {
      text-align: center;
      margin-top: 90px;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 1px;
      color: rgba(122, 87, 87, 0.7);
    }

    .custom-popup h4 {
      margin: 0 0 10px;
      color: #8b5e5e;
      font-size: 16px;
    }

    .popup-img {
      width: 200px;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 6px 0;
      display: block;
      cursor: zoom-in;
    }

    .popup-gallery {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-behavior: smooth;
      margin: 6px 0 8px;
    }

    .popup-gallery::-webkit-scrollbar {
      height: 8px;
    }

    .popup-gallery::-webkit-scrollbar-thumb {
      background: rgba(156, 110, 110, 0.35);
      border-radius: 999px;
    }

    .popup-gallery::-webkit-scrollbar-track {
      background: rgba(215, 192, 192, 0.18);
      border-radius: 999px;
    }

    .popup-gallery img {
      flex: 0 0 auto;
      width: 180px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      cursor: zoom-in;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .popup-gallery img:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 12px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;
    }

    .continent-tooltip {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(168, 122, 122, 0.15);
      color: #8b5e5e;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(122, 87, 87, 0.08);
      font-family: "Times New Roman", Georgia, serif;
      font-style: italic;
      padding: 4px 8px;
    }

    .continent-tooltip:before {
      display: none;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(34, 23, 23, 0.78);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 28px;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      width: min(1000px, 92vw);
      max-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 88vh;
      border-radius: 14px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.22);
      background: #fff;
      display: block;
    }

    .lightbox-caption {
      position: absolute;
      left: 50%;
      bottom: -42px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      letter-spacing: 0.4px;
      text-align: center;
      width: 100%;
      pointer-events: none;
    }

    .lightbox-btn,
    .lightbox-close {
      position: absolute;
      border: none;
      background: rgba(255,255,255,0.14);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .lightbox-btn:hover,
    .lightbox-close:hover {
      background: rgba(255,255,255,0.22);
      transform: scale(1.04);
    }

    .lightbox-close {
      top: 20px;
      right: 22px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 24px;
      line-height: 1;
    }

    .lightbox-btn {
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 64px;
      border-radius: 14px;
      font-size: 28px;
      line-height: 1;
    }

    .lightbox-btn:hover {
      transform: translateY(-50%) scale(1.04);
    }

    .lightbox-prev {
      left: 18px;
    }

    .lightbox-next {
      right: 18px;
    }

    @media (max-width: 760px) {
      .page {
        padding: 24px 16px 60px;
      }

      .country-grid {
        gap: 16px;
        margin-bottom: 48px;
      }

      .country-card {
        width: 130px;
        min-height: 82px;
      }

      .country-name {
        font-size: 20px;
      }

      .map-wrap {
        padding: 12px;
        border-radius: 8px;
      }

      #leaflet-map {
        height: 480px;
      }

      .popup-gallery img {
        width: 150px;
        height: 100px;
      }

      .lightbox {
        padding: 16px;
      }

      .lightbox-btn {
        width: 42px;
        height: 56px;
        font-size: 24px;
      }

      .lightbox-prev {
        left: 8px;
      }

      .lightbox-next {
        right: 8px;
      }

      .lightbox-close {
        top: 10px;
        right: 10px;
      }

      .lightbox-caption {
        bottom: -34px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="top-left">
        <div class="site-note">A place to leave traces.</div>
        <a href="home.html" class="back">← Back</a>
      </div>
      <a href="search.html" class="search-btn" aria-label="Search">⌕</a>
    </div>

    <div class="title-group">
      <div class="cn-title">漂流坐标</div>
      <div class="en-subtitle">Drift Coordinates</div>
    </div>

    <div class="country-grid">
      <a href="asia.html" class="country-card"><div class="country-name">Asia</div></a>
      <a href="europe.html" class="country-card"><div class="country-name">Europe</div></a>
      <a href="north-america.html" class="country-card"><div class="country-name">North<br>America</div></a>
      <a href="south-america.html" class="country-card"><div class="country-name">South<br>America</div></a>
      <a href="oceania.html" class="country-card"><div class="country-name">Oceania</div></a>
      <a href="africa.html" class="country-card"><div class="country-name">Africa</div></a>
      <a href="antarctica.html" class="country-card"><div class="country-name">Antarctica</div></a>
    </div>

    <section class="map-section">
      <div class="map-title">Visited Places</div>
      <div class="map-note">
        点击洲块可以继续进入对应页面；已到访地点会以发光圆点标记。
      </div>

      <div class="map-wrap">
        <div id="leaflet-map" aria-label="World map"></div>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-block"></span>
            <span>Clickable continent area</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot"></span>
            <span>Visited place</span>
          </div>
        </div>
      </div>
    </section>

    <div class="footer-note">
      places I have passed, and places that stayed.
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
    <button class="lightbox-btn lightbox-prev" id="lightbox-prev" aria-label="Previous image">‹</button>

    <div class="lightbox-inner">
      <img id="lightbox-img" class="lightbox-img" src="" alt="" />
      <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <button class="lightbox-btn lightbox-next" id="lightbox-next" aria-label="Next image">›</button>
  </div>

  <script>
    const map = L.map('leaflet-map', {
      zoomControl: true,
      scrollWheelZoom: true,
      worldCopyJump: false
    }).setView([10, 18], 2);

    L.tileLayer(
      'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
      {
        subdomains: ['1', '2', '3', '4'],
        attribution: '© 高德地图'
      }
    ).addTo(map);

    const continentStyle = {
      color: '#ffffff',
      weight: 1.5,
      fillColor: '#d7c0c0',
      fillOpacity: 0.40
    };

    const continentHoverStyle = {
      fillColor: '#cfaeae',
      fillOpacity: 0.62
    };

    function bindContinentRegion(shapes, pageUrl, name, tooltipLatLng = null) {
      const layers = [];

      shapes.forEach(coords => {
        const polygon = L.polygon(coords, continentStyle).addTo(map);
        layers.push(polygon);
      });

      const tooltipTarget = L.marker(
        tooltipLatLng || layers[0].getBounds().getCenter(),
        { opacity: 0 }
      ).addTo(map);

      tooltipTarget.bindTooltip(name, {
        permanent: false,
        direction: 'center',
        className: 'continent-tooltip'
      });

      function setHoverStyle() {
        layers.forEach(layer => layer.setStyle(continentHoverStyle));
        tooltipTarget.openTooltip();
      }

      function resetStyle() {
        layers.forEach(layer => layer.setStyle(continentStyle));
        tooltipTarget.closeTooltip();
      }

      function goPage() {
        window.location.href = pageUrl;
      }

      layers.forEach(layer => {
        layer.on('mouseover', setHoverStyle);
        layer.on('mouseout', resetStyle);
        layer.on('click', goPage);
      });

      return layers;
    }

    const continents = [
      {
        name: 'North America',
        page: 'north-america.html',
        tooltip: [48, -105],
        shapes: [
          [
            [72, -168], [71, -160], [69, -150], [68, -140], [70, -130],
            [68, -120], [65, -110], [61, -100], [57, -93], [53, -87],
            [49, -83], [46, -79], [42, -75], [38, -72], [33, -75],
            [28, -80], [24, -88], [21, -97], [21, -107], [24, -117],
            [28, -124], [33, -130], [39, -136], [45, -145], [52, -154],
            [60, -163], [67, -168], [72, -168]
          ],
        ]
      },
      {
        name: 'South America',
        page: 'south-america.html',
        tooltip: [-15, -60],
        shapes: [
          [
            [13, -81], [11, -78], [9, -74], [7, -70], [4, -66],
            [1, -62], [-3, -58], [-8, -55], [-13, -53], [-18, -52],
            [-23, -53], [-28, -55], [-33, -58], [-38, -61], [-43, -64],
            [-48, -67], [-53, -69], [-55, -71], [-52, -73], [-47, -73],
            [-41, -72], [-34, -71], [-27, -70], [-20, -69], [-13, -68],
            [-6, -67], [0, -68], [5, -71], [9, -75], [13, -81]
          ]
        ]
      },
      {
        name: 'Europe',
        page: 'europe.html',
        tooltip: [54, 15],
        shapes: [
          [
            [71, -10], [71, -4], [70, 3], [69, 10], [67, 18],
            [65, 24], [63, 30], [60, 35], [57, 39], [54, 40],
            [51, 38], [48, 34], [45, 30], [43, 26], [41, 22],
            [40, 17], [40, 12], [41, 7], [43, 2], [46, -2],
            [49, -5], [53, -8], [58, -10], [64, -11], [69, -11],
            [71, -10]
          ],
        ]
      },
      {
        name: 'Africa',
        page: 'africa.html',
        tooltip: [5, 18],
        shapes: [
          [
            [37, -17], [36, -10], [35, -2], [34, 7], [33, 16],
            [31, 24], [27, 31], [22, 35], [16, 40], [9, 44],
            [1, 47], [-8, 45], [-17, 41], [-25, 35], [-31, 28],
            [-35, 20], [-35, 11], [-32, 3], [-27, -4], [-20, -9],
            [-12, -13], [-3, -16], [8, -16], [19, -15], [29, -15],
            [37, -17]
          ]
        ]
      },
      {
        name: 'Asia',
        page: 'asia.html',
        tooltip: [38, 95],
        shapes: [
          [
            [78, 42], [77, 52], [76, 63], [74, 75], [72, 88],
            [70, 100], [67, 112], [63, 124], [58, 136], [52, 146],
            [46, 154], [39, 159], [32, 160], [26, 154], [20, 146],
            [15, 136], [10, 126], [7, 116], [6, 106], [7, 95],
            [10, 84], [14, 73], [20, 63], [27, 55], [35, 48],
            [44, 44], [55, 43], [66, 42], [78, 42]
          ],
          [
            [7, 95], [5, 100], [2, 105], [-2, 110], [-4, 116],
            [-3, 122], [0, 126], [4, 125], [6, 119], [6, 112],
            [7, 105], [7, 95]
          ]
        ]
      },
      {
        name: 'Oceania',
        page: 'oceania.html',
        tooltip: [-24, 138],
        shapes: [
          [
            [-10, 113], [-13, 118], [-16, 126], [-19, 134], [-23, 142],
            [-28, 149], [-33, 153], [-38, 150], [-42, 144], [-43, 136],
            [-41, 128], [-37, 120], [-31, 115], [-24, 113], [-16, 112],
            [-10, 113]
          ],
          [
            [-34, 166], [-37, 171], [-41, 175], [-45, 174], [-47, 169],
            [-43, 166], [-38, 165], [-34, 166]
          ]
        ]
      },
      {
        name: 'Antarctica',
        page: 'antarctica.html',
        tooltip: [-72, 0],
        shapes: [
          [
            [-60, -180], [-61, -150], [-63, -120], [-65, -90], [-67, -60],
            [-68, -30], [-69, 0], [-68, 30], [-67, 60], [-65, 90],
            [-63, 120], [-61, 150], [-60, 180], [-78, 180], [-80, 120],
            [-81, 60], [-82, 0], [-81, -60], [-80, -120], [-78, -180],
            [-60, -180]
          ]
        ]
      }
    ];

    continents.forEach(continent => {
      bindContinentRegion(
        continent.shapes,
        continent.page,
        continent.name,
        continent.tooltip
      );
    });

    function createGlowIcon() {
      return L.divIcon({
        className: '',
        html: `
          <div style="position: relative; width: 20px; height: 20px;">
            <div style="
              position: absolute;
              left: 50%;
              top: 50%;
              width: 18px;
              height: 18px;
              background: rgba(185,133,133,0.28);
              border-radius: 50%;
              transform: translate(-50%, -50%);
              box-shadow: 0 0 0 8px rgba(185,133,133,0.10);
            "></div>
            <div style="
              position: absolute;
              left: 50%;
              top: 50%;
              width: 10px;
              height: 10px;
              background: #9c6e6e;
              border: 2px solid #fff;
              border-radius: 50%;
              transform: translate(-50%, -50%);
            "></div>
          </div>
        `,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
    }

    const markers = [
      {
        lat: 48.8566,
        lng: 2.3522,
        title: 'France',
        imgs: [
          'https://raw.githubusercontent.com/forwebsite123/forwebsite123.github.io/main/111.jpeg',
          'https://picsum.photos/seed/france-2/1000/700',
          'https://picsum.photos/seed/france-3/1000/700',
          'https://picsum.photos/seed/france-1/1000/700'
        ]
      },
      {
        lat: 39.9042,
        lng: 116.4074,
        title: 'China',
        imgs: [
          'https://picsum.photos/seed/china-1/1000/700',
          'https://picsum.photos/seed/china-2/1000/700',
          'https://picsum.photos/seed/china-3/1000/700'
        ]
      },
      {
        lat: 35.6762,
        lng: 139.6503,
        title: 'Japan',
        imgs: [
          'https://picsum.photos/seed/japan-1/1000/700',
          'https://picsum.photos/seed/japan-2/1000/700',
          'https://picsum.photos/seed/japan-3/1000/700'
        ]
      },
      {
        lat: 13.7563,
        lng: 100.5018,
        title: 'Thailand',
        imgs: [
          'https://picsum.photos/seed/thailand-1/1000/700',
          'https://picsum.photos/seed/thailand-2/1000/700',
          'https://picsum.photos/seed/thailand-3/1000/700'
        ]
      }
    ];

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderImages(imgs, title) {
      if (!imgs || imgs.length === 0) return '';

      if (imgs.length === 1) {
        return `
          <img
            src="${imgs[0]}"
            class="popup-img"
            alt="${escapeHtml(title)}"
            data-gallery="${escapeHtml(title)}"
            data-index="0"
          >
        `;
      }

      return `
        <div class="popup-gallery">
          ${imgs.map((src, index) => `
            <img
              src="${src}"
              alt="${escapeHtml(title)} ${index + 1}"
              data-gallery="${escapeHtml(title)}"
              data-index="${index}"
            >
          `).join('')}
        </div>
      `;
    }

    markers.forEach(point => {
      const popupHtml = `
        <div class="custom-popup">
          <h4>${escapeHtml(point.title)}</h4>
          ${renderImages(point.imgs, point.title)}
          <p>点击图片可放大查看 · 点击地图洲块可进入对应页面</p>
        </div>
      `;

      L.marker([point.lat, point.lng], {
        icon: createGlowIcon()
      })
        .addTo(map)
        .bindPopup(popupHtml);
    });

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const lightboxClose = document.getElementById('lightbox-close');
    const lightboxPrev = document.getElementById('lightbox-prev');
    const lightboxNext = document.getElementById('lightbox-next');

    let activeGallery = [];
    let activeTitle = '';
    let activeIndex = 0;

    function updateLightbox() {
      if (!activeGallery.length) return;
      lightboxImg.src = activeGallery[activeIndex];
      lightboxImg.alt = `${activeTitle} ${activeIndex + 1}`;
      lightboxCaption.textContent = `${activeTitle} · ${activeIndex + 1} / ${activeGallery.length}`;
      lightboxPrev.style.display = activeGallery.length > 1 ? 'block' : 'none';
      lightboxNext.style.display = activeGallery.length > 1 ? 'block' : 'none';
    }

    function openLightbox(title, imgs, index) {
      activeTitle = title;
      activeGallery = imgs.slice();
      activeIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }

    function showPrevImage() {
      if (!activeGallery.length) return;
      activeIndex = (activeIndex - 1 + activeGallery.length) % activeGallery.length;
      updateLightbox();
    }

    function showNextImage() {
      if (!activeGallery.length) return;
      activeIndex = (activeIndex + 1) % activeGallery.length;
      updateLightbox();
    }

    document.addEventListener('click', function (event) {
      const target = event.target;

      if (target.matches('.popup-gallery img, .popup-img')) {
        const galleryName = target.dataset.gallery;
        const clickedIndex = Number(target.dataset.index || 0);
        const point = markers.find(item => item.title === galleryName);

        if (point && point.imgs && point.imgs.length) {
          openLightbox(point.title, point.imgs, clickedIndex);
        }
      }
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', function (e) {
      e.stopPropagation();
      showPrevImage();
    });
    lightboxNext.addEventListener('click', function (e) {
      e.stopPropagation();
      showNextImage();
    });

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (!lightbox.classList.contains('active')) return;

      if (e.key === 'Escape') {
        closeLightbox();
      } else if (e.key === 'ArrowLeft') {
        showPrevImage();
      } else if (e.key === 'ArrowRight') {
        showNextImage();
      }
    });
  </script>
</body>
</html>
