<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漂流坐标 · Drift Coordinates</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fcfbf8;
      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 34px 28px 90px;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    .top-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-note {
      font-size: 14px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.7);
      letter-spacing: 0.3px;
    }

    .back {
      text-decoration: none;
      color: rgba(122, 87, 87, 0.75);
      font-size: 15px;
    }

    .search-btn {
      text-decoration: none;
      color: #8a6666;
      font-size: 28px;
      line-height: 1;
    }

    .title-group {
      margin-bottom: 34px;
    }

    .cn-title {
      font-size: 28px;
      color: #8b5e5e;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .en-subtitle {
      font-size: 16px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.68);
    }

    .country-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 22px 28px;
      max-width: 860px;
      margin: 0 auto 70px;
    }

    .country-card {
      width: 150px;
      min-height: 92px;
      padding: 12px;
      border: 1.3px solid #b69191;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #8b5e5e;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      border-radius: 12px;
    }

    .country-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(122, 87, 87, 0.08);
      background: rgba(255,255,255,0.55);
    }

    .country-name {
      text-align: center;
      font-size: 23px;
      line-height: 1.2;
      font-style: italic;
    }

    .map-section {
      text-align: center;
    }

    .map-title {
      font-size: 24px;
      font-style: italic;
      color: #8b5e5e;
      margin-bottom: 8px;
    }

    .map-note {
      font-size: 14px;
      color: rgba(122, 87, 87, 0.65);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    .map-wrap {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 22px 22px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.2));
      border: 1px solid rgba(168, 122, 122, 0.12);
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(122, 87, 87, 0.06);
    }

    /* 新的地图容器 */
    #leaflet-map {
      width: 100%;
      height: 620px;
      border-radius: 12px;
      overflow: hidden;
    }

    .legend {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 14px;
      color: rgba(122, 87, 87, 0.72);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #9c6e6e;
      box-shadow: 0 0 0 6px rgba(185, 133, 133, 0.18);
    }

    .legend-block {
      width: 18px;
      height: 14px;
      background: #d7c0c0;
      border: 1px solid rgba(122, 87, 87, 0.12);
    }

    .footer-note {
      text-align: center;
      margin-top: 90px;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 1px;
      color: rgba(122, 87, 87, 0.7);
    }

    .custom-popup h4 {
      margin: 0 0 8px;
      color: #8b5e5e;
      font-size: 16px;
    }

    .popup-img {
      width: 200px;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 6px 0;
      display: block;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 12px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;
    }

    @media (max-width: 760px) {
      .page {
        padding: 24px 16px 60px;
      }

      .country-grid {
        gap: 16px;
        margin-bottom: 48px;
      }

      .country-card {
        width: 130px;
        min-height: 82px;
      }

      .country-name {
        font-size: 20px;
      }

      .map-wrap {
        padding: 12px;
        border-radius: 8px;
      }

      #leaflet-map {
        height: 480px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="top-left">
        <div class="site-note">A place to leave trace.</div>
        <a href="home.html" class="back">← Back</a>
      </div>
      <a href="search.html" class="search-btn" aria-label="Search">⌕</a>
    </div>

    <div class="title-group">
      <div class="cn-title">漂流坐标</div>
      <div class="en-subtitle">Drift Coordinates</div>
    </div>

    <div class="country-grid">
      <a href="asia.html" class="country-card"><div class="country-name">Asia</div></a>
      <a href="europe.html" class="country-card"><div class="country-name">Europe</div></a>
      <a href="north-america.html" class="country-card"><div class="country-name">North<br>America</div></a>
      <a href="south-america.html" class="country-card"><div class="country-name">South<br>America</div></a>
      <a href="oceania.html" class="country-card"><div class="country-name">Oceania</div></a>
      <a href="africa.html" class="country-card"><div class="country-name">Africa</div></a>
    </div>

    <section class="map-section">
      <div class="map-title">Visited Places</div>
      <div class="map-note">
        点击洲块可以继续进入对应页面；已到访地点会以发光圆点标记。
      </div>

      <div class="map-wrap">
        <div id="leaflet-map" aria-label="World map"></div>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-block"></span>
            <span>Clickable continent area</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot"></span>
            <span>Visited place</span>
          </div>
        </div>
      </div>
    </section>

    <div class="footer-note">
      places I have passed, and places that stayed.
    </div>
  </div>

  <script>
    const map = L.map('leaflet-map', {
      zoomControl: true,
      scrollWheelZoom: true,
      worldCopyJump: false
    }).setView([20, 20], 2);

    // 高德地图 HTTPS 底图
    L.tileLayer(
      'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
      {
        subdomains: ['1', '2', '3', '4'],
        attribution: '© 高德地图'
      }
    ).addTo(map);

    // 洲块样式
    const continentStyle = {
      color: '#ffffff',
      weight: 1.5,
      fillColor: '#d7c0c0',
      fillOpacity: 0.45
    };

    const continentHoverStyle = {
      fillColor: '#cdaaaa',
      fillOpacity: 0.62
    };

    function bindContinentPolygon(coords, pageUrl, name) {
      const polygon = L.polygon(coords, continentStyle).addTo(map);

      polygon.bindTooltip(name, {
        permanent: false,
        direction: 'center',
        className: 'continent-tip'
      });

      polygon.on('mouseover', function () {
        polygon.setStyle(continentHoverStyle);
      });

      polygon.on('mouseout', function () {
        polygon.setStyle(continentStyle);
      });

      polygon.on('click', function () {
        window.location.href = pageUrl;
      });

      return polygon;
    }

    // 近似洲块范围（可继续微调）
    bindContinentPolygon(
      [
        [72, -168],
        [72, -50],
        [12, -50],
        [12, -168]
      ],
      'north-america.html',
      'North America'
    );

    bindContinentPolygon(
      [
        [13, -82],
        [13, -34],
        [-58, -34],
        [-58, -82]
      ],
      'south-america.html',
      'South America'
    );

    bindContinentPolygon(
      [
        [72, -10],
        [72, 45],
        [35, 45],
        [35, -10]
      ],
      'europe.html',
      'Europe'
    );

    bindContinentPolygon(
      [
        [37, -20],
        [37, 55],
        [-35, 55],
        [-35, -20]
      ],
      'africa.html',
      'Africa'
    );

    bindContinentPolygon(
      [
        [80, 45],
        [80, 180],
        [0, 180],
        [0, 45]
      ],
      'asia.html',
      'Asia'
    );

    bindContinentPolygon(
      [
        [0, 110],
        [0, 180],
        [-50, 180],
        [-50, 110]
      ],
      'oceania.html',
      'Oceania'
    );

    // 发光点图标
    function createGlowIcon(label) {
      return L.divIcon({
        className: '',
        html: `
          <div style="position: relative; width: 20px; height: 20px;">
            <div style="
              position: absolute;
              left: 50%;
              top: 50%;
              width: 18px;
              height: 18px;
              background: rgba(185,133,133,0.28);
              border-radius: 50%;
              transform: translate(-50%, -50%);
              box-shadow: 0 0 0 8px rgba(185,133,133,0.10);
            "></div>
            <div style="
              position: absolute;
              left: 50%;
              top: 50%;
              width: 10px;
              height: 10px;
              background: #9c6e6e;
              border: 2px solid #fff;
              border-radius: 50%;
              transform: translate(-50%, -50%);
            "></div>
          </div>
        `,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
    }

    // 已到访地点
    const markers = [
      {
        lat: 48.8566,
        lng: 2.3522,
        title: 'France',
        img: 'https://picsum.photos/seed/france/300/200'
      },
      {
        lat: 39.9042,
        lng: 116.4074,
        title: 'China',
        img: 'https://picsum.photos/seed/china/300/200'
      },
      {
        lat: 35.6762,
        lng: 139.6503,
        title: 'Japan',
        img: 'https://picsum.photos/seed/japan/300/200'
      },
      {
        lat: 13.7563,
        lng: 100.5018,
        title: 'Thailand',
        img: 'https://picsum.photos/seed/thailand/300/200'
      }
    ];

    markers.forEach(point => {
      L.marker([point.lat, point.lng], {
        icon: createGlowIcon(point.title)
      })
        .addTo(map)
        .bindPopup(`
          <div class="custom-popup">
            <h4>${point.title}</h4>
            <img src="${point.img}" class="popup-img" alt="${point.title}">
            <p>点击地图洲块可进入对应页面</p>
          </div>
        `);
    });
  </script>
</body>
</html>
