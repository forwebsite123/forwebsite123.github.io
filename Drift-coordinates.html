    }

    .topbar {

      justify-content: space-between;

    }

    .top-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-note {
      font-size: 14px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.7);
      letter-spacing: 0.3px;
    }

    .back {
      text-decoration: none;
      color: rgba(122, 87, 87, 0.75);
      font-size: 15px;
    }

    .search-btn {
      text-decoration: none;
      color: #8a6666;
      font-size: 28px;
      line-height: 1;
    }

    .title-group {
      margin-bottom: 34px;
    }

    .cn-title {
      font-size: 34px;
      color: #8b5e5e;
      font-style: italic;
      margin-bottom: 8px;
    }

    .en-subtitle {
      font-size: 16px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.68);
    }

    .country-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 22px 28px;
      max-width: 980px;
      margin: 0 auto 70px;
    }

    .country-card {
      width: 150px;
      min-height: 92px;
      padding: 12px;
      border: 1.3px solid #b69191;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #8b5e5e;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      border-radius: 12px;
    }

    .country-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(122, 87, 87, 0.08);
      background: rgba(255,255,255,0.55);
    }

    .country-name {
      text-align: center;
      font-size: 23px;
      line-height: 1.2;
      font-style: italic;
    }

    .map-section {
      text-align: center;
    }

    .map-title {
      font-size: 24px;
      font-style: italic;
      color: #8b5e5e;
      margin-bottom: 8px;
    }

    .map-note {
      font-size: 14px;
      color: rgba(122, 87, 87, 0.65);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    .map-wrap {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 22px 22px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.2));

      height: 620px;
      border-radius: 12px;

      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 14px;
      color: rgba(122, 87, 87, 0.72);

    .legend-item {

      align-items: center;
      gap: 8px;

      border-radius: 50%;

      box-shadow: 0 0 0 6px rgba(185, 133, 133, 0.18);

    .legend-block {

      height: 14px;
      background: #d7c0c0;

      font-size: 14px;
      font-style: italic;
      letter-spacing: 1px;

      height: auto;
      border-radius: 8px;
      margin: 6px 0;

      padding-bottom: 4px;

    }

      border-radius: 999px;
    }

    .popup-gallery::-webkit-scrollbar-track {
      background: rgba(215, 192, 192, 0.18);
      border-radius: 999px;
    }

    .popup-gallery img {
      flex: 0 0 auto;
      width: 180px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      cursor: zoom-in;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .popup-gallery img:hover {
      transform: translateY(-2px);
      opacity: 0.92;

    .leaflet-popup-content-wrapper {
      border-radius: 12px;

    .leaflet-popup-content {

      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;

      align-items: center;

      text-align: center;
      width: 100%;

  <script>
    const map = L.map('leaflet-map', {
      zoomControl: true,
      scrollWheelZoom: true,
      worldCopyJump: false
    }).setView([10, 18], 2);

    L.tileLayer(
      'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
      {
        subdomains: ['1', '2', '3', '4'],
        attribution: '© 高德地图'
      }
    ).addTo(map);

    const continentStyle = {
      color: '#ffffff',
      weight: 1.5,
      fillColor: '#d7c0c0',
      fillOpacity: 0.40
    };

    const continentHoverStyle = {
      fillColor: '#cfaeae',
      fillOpacity: 0.62
    };

    function bindContinentRegion(shapes, pageUrl, name, tooltipLatLng = null) {
      const layers = [];

      shapes.forEach(coords => {
        const polygon = L.polygon(coords, continentStyle).addTo(map);
        layers.push(polygon);
      });

      const tooltipTarget = L.marker(
        tooltipLatLng || layers[0].getBounds().getCenter(),
        { opacity: 0 }
      ).addTo(map);

      tooltipTarget.bindTooltip(name, {
        permanent: false,
        direction: 'center',
        className: 'continent-tooltip'
      });

      function setHoverStyle() {
        layers.forEach(layer => layer.setStyle(continentHoverStyle));
        tooltipTarget.openTooltip();
      }

      function resetStyle() {
        layers.forEach(layer => layer.setStyle(continentStyle));
        tooltipTarget.closeTooltip();
      }

      function goPage() {
        window.location.href = pageUrl;
      }

      layers.forEach(layer => {
        layer.on('mouseover', setHoverStyle);
        layer.on('mouseout', resetStyle);
        layer.on('click', goPage);
      });

      return layers;
    }

    continents.forEach(continent => {
      bindContinentRegion(
        continent.shapes,
        continent.page,
        continent.name,
        continent.tooltip
      );
    });

    function createGlowIcon() {
      return L.divIcon({
        className: '',
        html: `
          <div style="position: relative; width: 20px; height: 20px;">
            <div style="
              position: absolute;
              left: 50%;
              top: 50%;
              width: 18px;
              height: 18px;
              background: rgba(185,133,133,0.28);
              border-radius: 50%;
              transform: translate(-50%, -50%);
              box-shadow: 0 0 0 8px rgba(185,133,133,0.10);
            "></div>
            <div style="
              position: absolute;
              left: 50%;
              top: 50%;
              width: 10px;
              height: 10px;
              background: #9c6e6e;
              border: 2px solid #fff;
              border-radius: 50%;
              transform: translate(-50%, -50%);
            "></div>
          </div>
        `,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
    }

    let markers = [];

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function renderImages(imgs, title) {
      if (!imgs || imgs.length === 0) {
        return '<p style="color:rgba(122,87,87,0.5);font-style:italic;font-size:13px;">暂无照片</p>';
      }

      if (imgs.length === 1) {
        return `
          <img
            src="${imgs[0]}"
            class="popup-img"
            alt="${escapeHtml(title)}"
            data-gallery="${escapeHtml(title)}"
            data-index="0"
          >
        `;
      }

      return `
        <div class="popup-gallery">
          ${imgs.map((src, index) => `
            <img
              src="${src}"
              alt="${escapeHtml(title)} ${index + 1}"
              data-gallery="${escapeHtml(title)}"
              data-index="${index}"
            >
          `).join('')}
        </div>
      `;
    }

    // Fetch map-markers.json + photos.json and populate markers dynamically
    async function initMarkers() {
      let photosData = { items: [] };
      try {
        const res = await fetch('/photos.json');
        photosData = await res.json();
      } catch (e) {
        console.warn('Could not load photos.json:', e);
      }

      try {
        const res = await fetch('/map-markers.json');
        const data = await res.json();
        markers = data.markers || [];
      } catch (e) {
        console.warn('Could not load map-markers.json:', e);
        return;
      }

      markers.forEach(point => {
        // Filter photos belonging to this album page
        const albumPhotos = photosData.items
          .filter(item => item.page === point.page && item.image)
          .map(item => item.image);

        // Randomly pick up to 3
        const selected = shuffle(albumPhotos).slice(0, 3);
        point.imgs = selected;

        const popupHtml = `
          <div class="custom-popup">
            <h4><a href="${point.page}" style="color:#8b5e5e;text-decoration:none;border-bottom:1px dashed rgba(139,94,94,0.4);">${escapeHtml(point.title)}</a></h4>
            ${renderImages(selected, point.title)}
            <p style="font-size:12px;color:rgba(122,87,87,0.55);margin:8px 0 0;">点击标题进入相册 · 点击图片可放大</p>
          </div>
        `;

        L.marker([point.lat, point.lng], {
          icon: createGlowIcon()
        })
          .addTo(map)
          .bindPopup(popupHtml);
      });
    }

    initMarkers();

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const lightboxClose = document.getElementById('lightbox-close');
    const lightboxPrev = document.getElementById('lightbox-prev');
    const lightboxNext = document.getElementById('lightbox-next');

    let activeGallery = [];
    let activeTitle = '';
    let activeIndex = 0;

    function updateLightbox() {
      if (!activeGallery.length) return;
      lightboxImg.src = activeGallery[activeIndex];
      lightboxImg.alt = `${activeTitle} ${activeIndex + 1}`;
      lightboxCaption.textContent = `${activeTitle} · ${activeIndex + 1} / ${activeGallery.length}`;
      lightboxPrev.style.display = activeGallery.length > 1 ? 'block' : 'none';
      lightboxNext.style.display = activeGallery.length > 1 ? 'block' : 'none';
    }

    function openLightbox(title, imgs, index) {
      activeTitle = title;
      activeGallery = imgs.slice();
      activeIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }

    function showPrevImage() {
      if (!activeGallery.length) return;
      activeIndex = (activeIndex - 1 + activeGallery.length) % activeGallery.length;
      updateLightbox();
    }

    function showNextImage() {
      if (!activeGallery.length) return;
      activeIndex = (activeIndex + 1) % activeGallery.length;
      updateLightbox();
    }

    document.addEventListener('click', function (event) {
      const target = event.target;

      if (target.matches('.popup-gallery img, .popup-img')) {
        const galleryName = target.dataset.gallery;
        const clickedIndex = Number(target.dataset.index || 0);
        const point = markers.find(item => item.title === galleryName);

        if (point && point.imgs && point.imgs.length) {
          openLightbox(point.title, point.imgs, clickedIndex);
        }
      }
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', function (e) {
      e.stopPropagation();
      showPrevImage();
    });
    lightboxNext.addEventListener('click', function (e) {
      e.stopPropagation();
      showNextImage();
    });

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (!lightbox.classList.contains('active')) return;

      if (e.key === 'Escape') {
        closeLightbox();
      } else if (e.key === 'ArrowLeft') {
        showPrevImage();
      } else if (e.key === 'ArrowRight') {
        showNextImage();
      }
    });
  </script>
