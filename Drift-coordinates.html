<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漂流坐标 · Drift Coordinates</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fcfbf8;
      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 34px 28px 90px;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    .top-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-note {
      font-size: 14px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.7);
      letter-spacing: 0.3px;
    }

    .back {
      text-decoration: none;
      color: rgba(122, 87, 87, 0.75);
      font-size: 15px;
    }

    .search-btn {
      text-decoration: none;
      color: #8a6666;
      font-size: 28px;
      line-height: 1;
    }

    .title-group {
      margin-bottom: 34px;
    }

    .cn-title {
      font-size: 28px;
      color: #8b5e5e;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .en-subtitle {
      font-size: 16px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.68);
    }

    .country-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 22px 28px;
      max-width: 860px;
      margin: 0 auto 70px;
    }

    .country-card {
      width: 150px;
      min-height: 92px;
      padding: 12px;
      border: 1.3px solid #b69191;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #8b5e5e;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      border-radius: 2px;
    }

    .country-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(122, 87, 87, 0.08);
      background: rgba(255,255,255,0.55);
    }

    .country-name {
      text-align: center;
      font-size: 23px;
      line-height: 1.2;
      font-style: italic;
    }

    .map-section {
      text-align: center;
    }

    .map-title {
      font-size: 24px;
      font-style: italic;
      color: #8b5e5e;
      margin-bottom: 8px;
    }

    .map-note {
      font-size: 14px;
      color: rgba(122, 87, 87, 0.65);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    .map-wrap {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 22px 22px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.2));
      border: 1px solid rgba(168, 122, 122, 0.12);
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(122, 87, 87, 0.06);
    }

    .world-map {
      width: 100%;
      height: auto;
      display: block;
    }

    .ocean {
      fill: #f7f4ef;
    }

    .continent {
      fill: #e8dfd6;
      stroke: #ffffff;
      stroke-width: 2.2;
      transition: fill 0.2s ease, transform 0.2s ease;
      cursor: pointer;
    }

    .continent:hover {
      fill: #ddd0c4;
    }

    .continent.visited-area {
      fill: #d7c0c0;
    }

    .map-label {
      font-size: 20px;
      fill: rgba(122, 87, 87, 0.66);
      font-style: italic;
      letter-spacing: 0.5px;
    }

    .route-line {
      fill: none;
      stroke: rgba(168, 122, 122, 0.32);
      stroke-width: 1.8;
      stroke-dasharray: 7 7;
    }

    .pin-glow {
      fill: rgba(185, 133, 133, 0.18);
    }

    .pin {
      fill: #9c6e6e;
      stroke: #fff;
      stroke-width: 2;
    }

    .pin-label {
      font-size: 15px;
      fill: #8b5e5e;
      font-family: "Times New Roman", Georgia, serif;
      font-style: italic;
      letter-spacing: 0.2px;
    }

    .legend {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 14px;
      color: rgba(122, 87, 87, 0.72);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #9c6e6e;
      box-shadow: 0 0 0 6px rgba(185, 133, 133, 0.18);
    }

    .legend-block {
      width: 18px;
      height: 14px;
      background: #e8dfd6;
      border: 1px solid rgba(122, 87, 87, 0.08);
    }

    .footer-note {
      text-align: center;
      margin-top: 90px;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 1px;
      color: rgba(122, 87, 87, 0.7);
    }

    @media (max-width: 760px) {
      .page {
        padding: 24px 16px 60px;
      }

      .country-grid {
        gap: 16px;
        margin-bottom: 48px;
      }

      .country-card {
        width: 130px;
        min-height: 82px;
      }

      .country-name {
        font-size: 20px;
      }

      .map-wrap {
        padding: 12px;
        border-radius: 8px;
      }

      .map-label {
        font-size: 14px;
      }

      .pin-label {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="top-left">
        <div class="site-note">A place to leave trace.</div>
        <a href="home.html" class="back">← Back</a>

        </svg>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-block"></span>
            <span>Continent</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot"></span>
            <span>Visited place</span>
          </div>
        </div>
      </div>
    </section>

    <div class="footer-note">
      places I have passed, and places that stayed.
    </div>
  </div>
</body>
</html>
