<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漂流坐标 · Print Coordinates</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fcfbf8;
      color: #6e4a4a;
      font-family: "Times New Roman", Georgia, serif;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 34px 28px 90px;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cn-title {
      font-size: 26px;
      color: #8b5e5e;
      letter-spacing: 1px;
    }

    .back {
      text-decoration: none;
      color: rgba(122, 87, 87, 0.75);
      font-size: 15px;
    }

    .search-btn {
      text-decoration: none;
      color: #8a6666;
      font-size: 28px;
      line-height: 1;
    }

    .grid-wrap {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

    .continent-grid {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 34px 40px;
      align-items: start;
    }

    .top-center {
      grid-column: 2 / span 2;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 34px 40px;
    }

    .bottom-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 34px 40px;
    }

    .continent-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 170px;
      padding: 20px;
      text-decoration: none;
      color: #8b5e5e;
      border: 1.5px solid #a87a7a;
      background: rgba(255,255,255,0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .continent-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(122, 87, 87, 0.08);
      background: rgba(255,255,255,0.58);
    }

    .continent-card.featured {
      min-height: 190px;
      color: #7d4f4f;
    }

    .card-text {
      text-align: center;
      font-size: 26px;
      line-height: 1.35;
      font-style: italic;
      font-weight: 500;
    }

    .card-text.small {
      font-size: 22px;
    }

    .footer-note {
      text-align: center;
      margin-top: 100px;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 1px;
      color: rgba(122, 87, 87, 0.7);
    }

    @media (max-width: 980px) {
      .continent-grid,
      .top-center,
      .bottom-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }

      .top-center,
      .bottom-row {
        grid-column: auto;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 24px 16px 60px;
      }

      .continent-grid,
      .top-center,
      .bottom-row {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .continent-card,
      .continent-card.featured {
        min-height: 130px;
      }

      .card-text {
        font-size: 24px;
      }

      .card-text.small {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title-group">
        <div class="cn-title">漂流坐标</div>
        <a href="home.html" class="back">← Back</a>
      </div>
      <a href="search.html" class="search-btn" aria-label="Search">⌕</a>
    </div>

    <div class="grid-wrap">
      <div class="continent-grid">
        <div class="top-center">
          <a href="asia.html" class="continent-card featured">
            <div class="card-text">Asia</div>
          </a>

          <a href="europe.html" class="continent-card featured">
            <div class="card-text">Europe</div>
          </a>
        </div>

        <div class="bottom-row">
          <a href="north-america.html" class="continent-card">
            <div class="card-text small">North<br>America</div>
          </a>

          <a href="south-america.html" class="continent-card">
            <div class="card-text small">South<br>America</div>
          </a>

          <a href="oceania.html" class="continent-card">
            <div class="card-text">Oceania</div>
          </a>

          <a href="antarctica.html" class="continent-card">
            <div class="card-text">Antarctica</div>
          </a>
        </div>
      </div>
    </div>

    <div class="footer-note">
      places I have passed, and places that stayed.
    </div>
  </div>
</body>
</html>
