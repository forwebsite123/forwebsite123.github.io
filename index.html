<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌿%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --rose-muted: #8a6b6b;
      --rose-dark: #6b4f4f;
      --cream: #f7f3f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--cream);
      color: var(--rose-dark);
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      height: 72vh;
      background-image: url("IMG_3697.JPG");
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .hero-image::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 140px;
      background: linear-gradient(to bottom, rgba(247,243,240,0) 30%, var(--cream) 100%);
    }

    .content {
      position: absolute;
      left: 50%;
      bottom: 5vh;
      transform: translateX(-50%);
      text-align: center;
      width: 90%;
      max-width: 700px;
      z-index: 2;
    }

    .content h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 48px;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.02em;
      margin: 52px 0 28px;
      color: var(--rose-dark);
    }

    /* ── 镂空描边按钮 ── */
    .enter-btn {
      position: relative;
      display: inline-block;
      padding: 13px 38px;
      border-radius: 999px;
      border: 1.5px solid var(--rose-muted);
      background: transparent;
      color: var(--rose-muted);
      text-decoration: none;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      overflow: visible;
      transition: color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .enter-btn:hover {
      color: var(--rose-dark);
      border-color: var(--rose-dark);
      box-shadow: 0 0 0 4px rgba(138, 107, 107, 0.08);
    }

    /* 点击时的向外扩散光环 */
    .enter-btn::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 999px;
      border: 1.5px solid var(--rose-muted);
      opacity: 0;
      pointer-events: none;
    }

    .enter-btn.clicked::after {
      animation: ring-expand 0.6s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }

    .enter-btn.clicked {
      animation: btn-pulse 0.6s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }

    @keyframes ring-expand {
      0%   { transform: scale(1);    opacity: 0.7; }
      100% { transform: scale(1.55); opacity: 0;   }
    }

    @keyframes btn-pulse {
      0%   { box-shadow: 0 0 0 0   rgba(138,107,107,0.0); }
      30%  { box-shadow: 0 0 0 8px rgba(138,107,107,0.12); }
      100% { box-shadow: 0 0 0 16px rgba(138,107,107,0.0); }
    }

    @media (max-width: 768px) {
      .hero-image { height: 58vh; }
      .content { bottom: 10vh; }
      .content h1 { font-size: 30px; margin-top: 20px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-image"></div>
    <div class="content">
      <h1>A place to leave traces.</h1>
      <a href="home.html" class="enter-btn" id="enterBtn">Wander In.</a>
    </div>
  </section>

  <script>
    const btn = document.getElementById('enterBtn');
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      btn.classList.remove('clicked');
      void btn.offsetWidth; // reflow to restart animation
      btn.classList.add('clicked');
      btn.addEventListener('animationend', () => {
        btn.classList.remove('clicked');
        window.location.href = btn.href;
      }, { once: true });
    });
  </script>

  <script data-goatcounter="https://kiara-mytrace.goatcounter.com/count"
      async src="https://gc.zgo.at/count.js"></script>
  <script>
    (function() {
      fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(d => {
          console.log("Session Log:", {
            timestamp: new Date().toISOString(),
            location: `${d.city}, ${d.region}, ${d.country_name}`,
            network: d.org,
            resolution: `${window.innerWidth}px`,
            referrer: document.referrer || "direct"
          });
        })
        .catch(() => {});
    })();
  </script>
</body>
</html>
