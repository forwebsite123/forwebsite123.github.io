<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: white;
      color: #333;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      height: 70vh;
      background-image: url("IMG_3697.JPG");
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* 图片向下渐变到白色 */
    .hero-image::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 30px;
      background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, white 100%);
    }

    .content {
      position: absolute;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      text-align: center;
      width: 90%;
      max-width: 700px;
      z-index: 2;
    }

    .content h1 {
      font-size: 38px;
      font-weight: 600;
      margin: 0 0 16px;
      color: #1f2937;
    }

    .content p {
      font-size: 17px;
      line-height: 1.8;
      color: #6b7280;
      margin: 0 0 28px;
    }

    .enter-btn {
      display: inline-block;
      padding: 14px 34px;
      border-radius: 999px;
      background: #111827;
      color: white;
      text-decoration: none;
      font-size: 15px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .enter-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      .hero-image {
        height: 58vh;
      }

      .content {
        bottom: 10vh;
      }

      .content h1 {
        font-size: 28px;
      }

      .content p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-image"></div>

    <div class="content">
      <h1><em>A place to leave traces.</em></h1>
      <a href="home.html" class="enter-btn"></em>WANDER IN.</em></a>
    </div>
  </section>
</body>
</html>
