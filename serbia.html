<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌿%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>serbia</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f7f6f3; color: #6d6662; font-family: "Helvetica Neue", Arial, sans-serif; }
    a { color: inherit; }
    .page { max-width: 1500px; margin: 0 auto; padding: 26px 28px 40px; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .top-left { display: flex; flex-direction: column; gap: 8px; }
    .site-note { font-size: 14px; font-style: italic; color: rgba(109, 102, 98, 0.72); }
    .back { text-decoration: none; font-size: 14px; color: rgba(109, 102, 98, 0.78); }
    .search-btn { text-decoration: none; color: rgba(109, 102, 98, 0.7); font-size: 26px; }
    .content { display: grid; grid-template-columns: minmax(0, 1fr) 250px; gap: 26px; }
    .masonry { column-count: 5; column-gap: 6px; }
    .photo-item { break-inside: avoid; margin-bottom: 6px; background: #ece9e4; }
    .photo-item img { width: 100%; cursor: pointer; }
    .video-item { break-inside: avoid; margin-bottom: 6px; position: relative; width: 100%; padding-top: 56.25%; }
    .video-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .sidebar-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; margin-top: 20px; }
    .tag-list, .camera-list { display: flex; flex-direction: column; gap: 10px; }
    .tag-link { text-decoration: none; font-size: 15px; color: #c2bbb3; }
    .tag-link:hover { color: #8c847d; }
    .camera-item { text-decoration: none; font-size: 15px; color: #c2bbb3; }
    .camera-item:hover { color: #8c847d; }
    @media (max-width: 760px) {
      .content { grid-template-columns: 1fr; }
      .masonry { order: 2; column-count: 2; border-top: 1px solid rgba(109, 102, 98, 0.15); padding-top: 16px; }
      aside { order: 1; display: flex; flex-wrap: wrap; gap: 20px 36px; }
      .sidebar-title { width: 100%; margin-bottom: 6px; }
      .tag-list, .camera-list { flex-direction: row; flex-wrap: wrap; gap: 8px 16px; }
    }
    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; }
    #lightbox img { max-width: 90vw; max-height: 90vh; }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="top-left">
        <div class="site-note">A place to leave traces.</div>
        <a href="europe.html" class="back">← Back</a>
      </div>
      <a href="#" class="search-btn" id="search-icon">⌕</a>
    </div>
    <div class="content">
      <div class="masonry" id="masonry"></div>
      <aside>
        <div class="sidebar-title">🏷 TAGS</div>
        <div class="tag-list">
          <a href="tag.html?tag=people&page=serbia.html" class="tag-link">People</a>
          <a href="tag.html?tag=Belgrade&page=serbia.html" class="tag-link">Belgrade</a>
          <a href="tag.html?tag=Kopaonik&page=serbia.html" class="tag-link">Kopaonik</a>
        </div>
        <div class="sidebar-title">📷 CAMERAS</div>
        <div class="camera-list">
          <a href="tag.html?tag=iphone&page=serbia.html" class="camera-item">Iphone🍎</a>
          <a href="tag.html?tag=fujifilm-xs10&page=serbia.html" class="camera-item">FUJIFILM XS10</a>
          <a href="tag.html?tag=fujifilm-XH2&page=serbia.html" class="camera-item">FUJIFILM XH2</a>
        </div>
      </aside>
    </div>
  </div>
  <div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img">
  </div>
  <script>
  async function loadPhotos() {
    const res = await fetch('/photos.json');
    const data = await res.json();
    const items = data.items.filter(p => p.page === 'serbia.html');
    const masonry = document.getElementById('masonry');
    items.forEach(p => {
      if (p.video) {
        masonry.innerHTML += `<div class="video-item"><iframe src="//player.bilibili.com/player.html?bvid=${p.video}&autoplay=0&high_quality=1" scrolling="no" frameborder="no" allowfullscreen="true"></iframe></div>`;
      } else {
        masonry.innerHTML += `<div class="photo-item"><img src="${p.image}" alt="${p.title || ''}" class="zoomable"></div>`;
      }
    });
    document.querySelectorAll('.zoomable').forEach(img=>{
      img.onclick=()=>{ document.getElementById('lightbox').style.display='flex'; document.getElementById('lightbox-img').src=img.src; }
    });
    const openParam = new URLSearchParams(location.search).get('open');
    if (openParam) {
      const target = [...document.querySelectorAll('.zoomable')].find(img => img.getAttribute('src') === openParam);
      if (target) target.click();
    }
  }
  loadPhotos();
  </script>
  <script data-goatcounter="https://kiara-mytrace.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <script src="/search.js"></script>
</body>
</html>
