<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌿%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Into the Wild</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fcfbf8;
      font-family: "Times New Roman", serif;
      color: #6e4a4a;
    }

    .page {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px 80px;
    }

    /* ✅ 统一 topbar（和前面页面一样） */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 60px;
    }

    .top-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .site-note {
      font-size: 14px;
      font-style: italic;
      color: rgba(122, 87, 87, 0.7);
    }

    .back {
      text-decoration: none;
      color: rgba(122, 87, 87, 0.78);
      font-size: 15px;
    }

    .search-btn {
      text-decoration: none;
      color: #8a6666;
      font-size: 26px;
      line-height: 1;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-style: italic;
      margin-bottom: 80px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 80px;
      flex-wrap: wrap;
    }

    .card {
      border-radius: 14px;
      border: 2px solid #9c7373;
      padding: 40px 60px;
      font-size: 40px;
      font-style: italic;
      text-decoration: none;
      color: #7a5757;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.6);
    }

    .note {
      margin-top: 60px;
      text-align: center;
      font-size: 16px;
      line-height: 1.8;
      color: #8b6b6b;
    }

    @media (max-width: 600px) {
      .cards {
        gap: 30px;
      }

      .card {
        font-size: 28px;
        padding: 30px 40px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- ✅ 统一后的左上角结构 -->
    <div class="topbar">
      <div class="top-left">
        <div class="site-note">A place to leave traces.</div>
        <a href="home.html" class="back">← Back</a>
      </div>
     <a href="#" class="search-btn" id="search-icon">⌕</a>
    </div>

    <h1>Into the Wild</h1>

    <div class="cards">
      <a href="snowboarding.html" class="card">Snowboarding</a>
      <a href="diving.html" class="card">Diving</a>
      <a href="horse-riding.html" class="card">Horse Riding</a>
      <a href="kitesurfing.html" class="card">Kite surfing</a>
    </div>

    <div class="note">
      These are the moments when I step outside of routine,<br>
      into something more intense, more alive.
    </div>

  </div>
 <script data-goatcounter="https://kiara-mytrace.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>
  <script src="/search.js"></script>
</body>
</html>
