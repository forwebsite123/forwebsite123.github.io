backend:
  name: github
  repo: forwebsite123/forwebsite123.github.io
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "photos"
    label: "照片"
    files:
      - name: "photo_list"
        label: "照片列表"
        file: "photos.json"
        format: json
        fields:
          - name: items
            label: 照片
            widget: list
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "图片", name: "image", widget: "image", required: false }
              - { label: "视频BV号", name: "video", widget: "string", required: false }
              - label: "标签 Tags"
                name: "tags"
                widget: "list"
                field:
                  label: Tag
                  name: tag
                  widget: string
              - { label: "页面链接", name: "page", widget: "string" }
              - { label: "页面名称", name: "pageLabel", widget: "string" }

  - name: "snowboarding"
    label: "Snowboarding"
    files:
      - name: "snowboarding_entries"
        label: "滑雪记录"
        file: "snowboarding.json"
        format: json
        fields:
          - name: entries
            label: 记录
            widget: list
            fields:
              - { label: "日期", name: "date", widget: "string" }
              - { label: "地点", name: "location", widget: "string" }
              - { label: "记录图", name: "record_image", widget: "image", required: false }
              - { label: "记录说明", name: "record_caption", widget: "string", required: false }
              - name: photos
                label: 照片
                widget: list
                field:
                  label: 图片
                  name: photo
                  widget: image
              - name: videos
                label: 视频BV号
                widget: list
                field:
                  label: BV号
                  name: bvid
                  widget: string
              - { label: "文字", name: "note", widget: "text", required: false }

  - name: "diving"
    label: "Diving"
    files:
      - name: "diving_entries"
        label: "潜水记录"
        file: "diving.json"
