              - name: photos
                label: 照片
                widget: list
                field:
                  label: 图片
                  name: photo
                  widget: image
              - name: videos
                label: 视频BV号
                widget: list
                field:
                  label: BV号
                  name: bvid
                  widget: string
              - { label: "文字", name: "note", widget: "text", required: false }

  - name: "horse_riding"
    label: "Horse Riding"
    files:
      - name: "horse_entries"
        label: "骑马记录"
        file: "horse-riding.json"
        format: json
        fields:
          - name: entries
            label: 记录
            widget: list
            fields:
              - { label: "日期", name: "date", widget: "string" }
              - { label: "地点", name: "location", widget: "string" }
              - name: photos
                label: 照片
                widget: list
                field:
                  label: 图片
                  name: photo
                  widget: image
              - name: videos
                label: 视频BV号
                widget: list
                field:
                  label: BV号
